<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="DojiDash Game Mode — predict up or down on the next candlestick and build your streak.">
    <title>DojiDash</title>
    <link rel="icon" href="assets/images/Logo.gif" type="image/gif">
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Design System: Dark Cinematic Theme -->
    <link rel="stylesheet" href="tokens-dark.css">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0f1a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        /* Chart container override */
        #chart { background: transparent !important; }
        
        /* Subtle glow effects */
        .glow-text-green { text-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .glow-text-red { text-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
    </style>
</head>

<body class="dark-theme">

    <div id="usernameDisplay" class="username-display"></div>
    <div id="streakDisplay" class="streak-display">Streak: 0</div>
    <div id="bestDisplay" class="best-display">Best: 0</div>

    <div class="chart-wrapper">
        <div id="chart"></div>
        <div id="glowOverlay" class="glow-overlay"></div>
    </div>

    <button id="downBtn" class="down">DOWN</button>
    <button id="upBtn" class="up">UP</button>

    <div id="resultPopup" class="popup hidden">
        <span id="popupResultText"></span>
    </div>

    <div id="wsbPopup" class="wsb-popup">
        <img id="mascotEmoji" class="wsb-emoji">
        <span id="wsbText" class="wsb-text"></span>
    </div>

    <div id="endScreen" class="end-screen hidden">
        <div class="end-content">
            <h2>Run Complete!</h2>
            <p id="resultText"></p>
            <button id="playAgainBtn">Play Again</button>
            <button id="homeBtn">Home</button>
        </div>
    </div>

    <!-- 1. Config -->
    <script src="config.js"></script>
    <!-- 2. Dependencies -->
    <script
        src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 3. Core Shared -->
    <script src="supabase.js"></script>
    <script src="shared/chart.js"></script>
    <script src="shared/ui.js"></script>
    <!-- 4. Page logic -->
    <script src="script.js"></script>
</body>

</html>
